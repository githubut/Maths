<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Tables: 1 to 30</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #040814;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #0f172a;
            --accent-1: #6366f1;
            --accent-2: #8b5cf6;
            --success: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(ellipse at top right, rgba(99, 102, 241, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse at bottom left, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 5rem 2rem 3rem;
            max-width: 900px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent-1));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .search-container {
            margin: 2rem 0;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        #tableSearch {
            width: 100%;
            padding: 15px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #fff;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }
        #tableSearch:focus {
            background: rgba(255,255,255,0.07);
            border-color: var(--accent-1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 92%;
            max-width: 1400px;
            padding-bottom: 6rem;
        }

        .table-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }
        .table-card:hover { transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .table-title { font-size: 1.6rem; font-weight: 800; color: var(--accent-1); margin-bottom: 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }

        .table-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            transition: background 0.1s;
        }
        .table-row:nth-child(even) { background: rgba(255,255,255,0.02); }
        .table-row:hover { background: rgba(99, 102, 241, 0.1); color: #fff; }

        .op { color: var(--text-muted); width: 30px; text-align: center; }
        .num { width: 30px; text-align: right; }
        .res { font-weight: 800; color: #fff; width: 60px; text-align: right; }

        .back-link { position: absolute; top: 2rem; left: 2rem; color: var(--text-muted); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .back-link:hover { color: #fff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-1); }

    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Hub</a>

    <header>
        <h1>Multiplication Library</h1>
        <p style="color:var(--text-muted); font-size:1.2rem; margin-top:1.5rem;">The foundational pillar of speed math. Master 1 to 30 for instantaneous mental recall.</p>
        
        <div class="search-container">
            <input type="text" id="tableSearch" placeholder="Jump to table (e.g. 17)..." onkeyup="filterTables()">
        </div>
    </header>

    <div class="tables-grid" id="tablesContainer">
        <!-- Tables populated by JavaScript -->
    </div>

    <script>
        const container = document.getElementById('tablesContainer');
        
        for (let i = 1; i <= 30; i++) {
            const card = document.createElement('div');
            card.className = 'table-card';
            card.innerHTML = `<div class="table-title">Table of ${i}</div>`;
            
        for (let j = 1; j <= 30; j++) {
                const row = document.createElement('div');
                row.className = 'table-row';
                row.innerHTML = `
                    <span>${i} <span class="op">×</span> ${j}</span>
                    <span class="res">${i * j}</span>
                `;
                card.appendChild(row);
            }
            container.appendChild(card);
        }

        function filterTables() {
            const input = document.getElementById('tableSearch');
            const filter = input.value.toLowerCase();
            const cards = document.getElementsByClassName('table-card');

            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].querySelector('.table-title').innerText;
                if (title.toLowerCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
